<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaio Adriel | Links</title>
    
    <!-- Tailwind & React -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Animações de entrada */
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Atrasos em cascata para os botões */
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Ícones em SVG
        const IconEmail = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>;
        const IconLinkedin = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>;
        const IconGithub = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>;
        const IconGlobe = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>;
        const IconApp = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>;

        const App = () => {
            // === CONFIGURAÇÃO DOS SEUS LINKS AQUI ===
            const profile = {
                name: "Kaio Adriel",
                role: "Administrador & Desenvolvedor",
                bio: "Transformando ideias em soluções eficientes.",
                // Troque este link pela URL da sua foto (pode ser a do seu GitHub)
                avatar: "https://avatars.githubusercontent.com/u/1234567?v=4" // Coloque o link correto da sua foto aqui
            };

            const links = [
                {
                    title: "O Meu App de Gestão",
                    url: "https://kaioadriel.com.br",
                    icon: <IconApp />,
                    highlight: true // Deixa este botão em destaque
                },
                {
                    title: "Portfólio / Site Pessoal",
                    url: "https://kaioadriel.com.br",
                    icon: <IconGlobe />,
                    highlight: false
                },
                {
                    title: "LinkedIn",
                    url: "https://kaioadriel.com.br", // Atualize com o seu LinkedIn
                    icon: <IconLinkedin />,
                    highlight: false
                },
                {
                    title: "GitHub",
                    url: "https://kaioadriel.com.br", // Atualize com o seu GitHub
                    icon: <IconGithub />,
                    highlight: false
                },
                {
                    title: "E-mail Profissional",
                    url: "mailto:contato@kaioadriel.com.br",
                    icon: <IconEmail />,
                    highlight: false
                }
            ];

            return (
                <div className="flex flex-col items-center justify-center py-20 px-6 max-w-lg mx-auto w-full relative">
                    
                    {/* Efeitos de Fundo Brilhantes */}
                    <div className="absolute top-0 -left-4 w-72 h-72 bg-emerald-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>
                    <div className="absolute bottom-0 -right-4 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-20"></div>

                    {/* Perfil */}
                    <div className="flex flex-col items-center mb-10 fade-in-up z-10">
                        <div className="w-28 h-28 rounded-full bg-slate-800 p-1 border-2 border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.3)] mb-4 overflow-hidden">
                            <img 
                                src={profile.avatar} 
                                alt="Foto de Perfil" 
                                className="w-full h-full rounded-full object-cover"
                                onError={(e) => { e.target.src = "https://ui-avatars.com/api/?name=Kaio+Adriel&background=0D8B93&color=fff&size=150" }} 
                            />
                        </div>
                        <h1 className="text-2xl font-black tracking-tight text-white">{profile.name}</h1>
                        <h2 className="text-sm font-bold text-emerald-400 mt-1 uppercase tracking-widest">{profile.role}</h2>
                        <p className="text-slate-400 text-center mt-3 text-sm max-w-xs">{profile.bio}</p>
                    </div>

                    {/* Lista de Links */}
                    <div className="w-full flex flex-col space-y-4 z-10">
                        {links.map((link, index) => (
                            <a 
                                key={index} 
                                href={link.url} 
                                target={link.url.startsWith('mailto') ? '_self' : '_blank'} 
                                rel="noopener noreferrer"
                                className={`fade-in-up delay-${index + 1} flex items-center p-4 w-full rounded-2xl transition-all duration-300 group
                                    ${link.highlight 
                                        ? 'bg-gradient-to-r from-emerald-500 to-teal-600 text-white shadow-lg shadow-emerald-500/25 hover:shadow-emerald-500/40 hover:-translate-y-1' 
                                        : 'bg-white/5 border border-white/10 text-slate-200 hover:bg-white/10 hover:-translate-y-1 backdrop-blur-md'
                                    }`}
                            >
                                <div className={`flex items-center justify-center w-10 h-10 rounded-xl mr-4 transition-transform group-hover:scale-110
                                    ${link.highlight ? 'bg-white/20' : 'bg-white/5'}`}>
                                    {link.icon}
                                </div>
                                <span className="font-bold flex-1 text-[15px]">{link.title}</span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`opacity-50 transition-transform group-hover:translate-x-1 ${link.highlight ? 'text-white' : 'text-slate-400'}`}><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </a>
                        ))}
                    </div>

                    {/* Footer */}
                    <div className="mt-16 fade-in-up delay-5 text-center z-10">
                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">
                            © {new Date().getFullYear()} Kaio Adriel. Todos os direitos reservados.
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
