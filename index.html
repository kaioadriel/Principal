<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaio Adriel | Em Construção</title>
    
    <!-- Tailwind & React -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; /* Fundo base escuro */
            margin: 0;
            min-height: 100vh;
            color: #f8fafc;
            overflow: hidden; /* Evita rolagem na página de construção */
        }

        /* Animações Premium */
        .fade-in-up {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }
        
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        /* Brilho de fundo flutuante */
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }
        .animate-float { animation: float 8s ease-in-out infinite; }
        .animate-float-delayed { animation: float 10s ease-in-out infinite 2s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const IconMail = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
        );

        const IconWrench = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z"></path>
            </svg>
        );

        const App = () => {
            return (
                <div className="relative flex flex-col items-center justify-center min-h-screen px-6 overflow-hidden">
                    
                    {/* Efeitos de Luz no Fundo (Orbes) */}
                    <div className="absolute top-1/4 -left-20 w-96 h-96 bg-emerald-500/20 rounded-full mix-blend-screen filter blur-[100px] animate-float z-0"></div>
                    <div className="absolute bottom-1/4 -right-20 w-96 h-96 bg-blue-600/20 rounded-full mix-blend-screen filter blur-[100px] animate-float-delayed z-0"></div>

                    {/* Conteúdo Principal (Glassmorphism) */}
                    <div className="relative z-10 flex flex-col items-center text-center max-w-2xl w-full p-10 md:p-16 rounded-[3rem] bg-white/5 border border-white/10 backdrop-blur-xl shadow-2xl">
                        
                        {/* Badge de Status */}
                        <div className="fade-in-up flex items-center bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest mb-8">
                            <span className="relative flex h-2 w-2 mr-3">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                            </span>
                            <IconWrench />
                            Site em Construção
                        </div>

                        {/* Nome do Mestre */}
                        <h1 className="fade-in-up delay-1 text-5xl md:text-7xl font-black tracking-tighter text-white mb-6">
                            Kaio <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500">Adriel</span>
                        </h1>

                        {/* Mensagem */}
                        <p className="fade-in-up delay-2 text-slate-400 text-lg md:text-xl font-light max-w-md mx-auto mb-12 leading-relaxed">
                            Estou a preparar uma nova experiência digital. Em breve, novidades sobre os meus projetos e soluções.
                        </p>

                        {/* Botão de Contacto */}
                        <a 
                            href="mailto:contato@kaioadriel.com.br"
                            className="fade-in-up delay-3 group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-200 bg-slate-800 border border-slate-700 rounded-full hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 focus:ring-offset-slate-900 overflow-hidden"
                        >
                            {/* Efeito de brilho no hover do botão */}
                            <div className="absolute inset-0 w-full h-full -x-full bg-gradient-to-r from-transparent via-white/10 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
                            
                            <IconMail />
                            <span className="ml-3 tracking-wide">contato@kaioadriel.com.br</span>
                        </a>

                    </div>

                    {/* Rodapé Invisível para equilibrar o layout */}
                    <div className="absolute bottom-8 text-center w-full z-10 fade-in-up delay-3">
                        <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest">
                            © {new Date().getFullYear()} Kaio Adriel.
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <style>
        /* Animação extra para o brilho do botão */
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
    </style>
</body>
</html>
